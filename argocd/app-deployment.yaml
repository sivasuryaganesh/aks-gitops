apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: python-app-test
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/sivasuryaganesh/aks-gitops.git
    targetRevision: HEAD
    path: helm/app-python
    helm:
    valueFiles:
      - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: test

  syncPolicy:
    automated:
      prune: true
      selfHeal: true 
      enabled: true