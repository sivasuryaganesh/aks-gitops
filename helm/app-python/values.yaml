namespace: test

image:
  repository: myacrdevops12345.azurecr.io/python-app
  tag: "fffdd006531af8e5afdb2cc8d5fb164b386700a6"
  imagePullPolicy: Always

service:
  type: LoadBalancer
  port: 80
  targetPort: 5000

pdb:
  enabled: true
  minAvailable: 1

cronjob:
  enabled: true
  serviceAccount:
    create: true
    name: cronjob-sa
  schedule: "* * * * *"

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

securityContext:
  runAsNonRoot: true
  runAsUser: 1000

nodeSelector: 
  workload: python-app