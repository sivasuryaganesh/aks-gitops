apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: timestamp-cronjob-rolebinding
  namespace: {{ .Values.namespace }}

subjects:
- kind: ServiceAccount
  name: {{ .Values.cronjob.serviceAccount.name }}
  namespace: {{ .Values.namespace }}

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: timestamp-cronjob-role